
services:
  mysql-db:
    image: mysql:8.0
    container_name: laptop_store_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laptop_store
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/mock-data-tx2.sql:/docker-entrypoint-initdb.d/01-mock-data.sql
    restart: unless-stopped

volumes:
  mysql_data:
